services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: german-notes-backend:${VERSION:-0.1.0}
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      - ./german_notes:/app/german_notes
    command: uvicorn german_notes.api.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    image: german-notes-frontend:${VERSION:-0.1.0}
    ports:
      - "5173:5173"
    environment:
      - API_URL=http://backend:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
