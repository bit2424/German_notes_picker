services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: german-notes-backend:${VERSION:-0.1.0}
    ports:
      - "8001:8001"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: german-notes-frontend:${VERSION:-0.1.0}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
